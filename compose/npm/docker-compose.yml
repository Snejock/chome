services:
  ch-npm:
    image: 'jlesage/nginx-proxy-manager:v25.09.1'
    container_name: ch-npm
    restart: unless-stopped
    ports:
      - '80:8080'
      - '443:4443'
      - '81:8181'
      - '9001:9001'
    networks:
      - ch-net
    volumes:
      - ch-npm-data:/config:rw
      # - npm_data:/data:rw
      # - npm_letsencrypt:/etc/letsencrypt:rw

volumes:
  ch-npm-data:
    name: ch-npm-data
    external: true
